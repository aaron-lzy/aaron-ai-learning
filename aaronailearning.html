<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Skill Forge for Aaron</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Geist+Mono:wght@400;600&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--s1:#131316;--s2:#1c1c21;--s3:#27272d;
  --border:#2a2a32;--text:#ececef;--dim:#71717a;--dim2:#52525b;
  --orange:#f97316;--orange-g:rgba(249,115,22,.12);
  --emerald:#10b981;--emerald-g:rgba(16,185,129,.12);
  --sky:#38bdf8;--sky-g:rgba(56,189,248,.12);
  --violet:#a78bfa;--violet-g:rgba(167,139,250,.12);
  --amber:#fbbf24;--amber-g:rgba(251,191,36,.12);
  --rose:#fb7185;--rose-g:rgba(251,113,133,.12);
  --radius:14px;
}
:root.light{
  --bg:#ffffff;--s1:#f5f5f5;--s2:#e5e5e5;--s3:#d4d4d4;
  --border:#d4d4d8;--text:#18181b;--dim:#52525b;--dim2:#71717a;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{max-width:1000px;margin:0 auto;padding:20px 16px 80px}

.hero{text-align:center;padding:40px 0 28px;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--orange),transparent)}
.hero h1{font-family:'Instrument Serif',serif;font-size:clamp(30px,6vw,46px);font-weight:400;letter-spacing:-.5px;line-height:1.1}
.hero h1 span{background:linear-gradient(135deg,var(--orange),#fb923c,var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{color:var(--dim);font-size:14px;margin-top:8px}
.hero .sub-cn{color:var(--dim2);font-size:13px;font-style:italic;margin-top:2px}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:24px 0 20px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center}
.stat .val{font-family:'Geist Mono',monospace;font-size:22px;font-weight:600}
.stat .lbl{font-size:11px;color:var(--dim);margin-top:2px}
.stat.c1 .val{color:var(--orange)}.stat.c2 .val{color:var(--emerald)}.stat.c3 .val{color:var(--sky)}.stat.c4 .val{color:var(--violet)}

.tabs{display:flex;gap:2px;background:var(--s1);border-radius:12px;padding:3px;margin-bottom:24px;overflow-x:auto}
.tab-btn{flex:1;padding:10px 6px;border:none;background:none;color:var(--dim);font-size:13px;font-weight:600;border-radius:10px;cursor:pointer;transition:.2s;white-space:nowrap;font-family:inherit}
.tab-btn:hover{color:var(--text)}
.tab-btn.on{background:var(--s2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.panel{display:none}.panel.on{display:block}

/* Philosophy banner */
.philosophy{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px;position:relative;overflow:hidden}
.philosophy::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--orange)}
.philosophy h3{font-size:14px;font-weight:700;margin-bottom:6px;color:var(--orange)}
.philosophy p{font-size:13px;color:var(--dim);line-height:1.6}
.philosophy .highlight{color:var(--text);font-weight:500}

/* Phase */
.phase{margin-bottom:28px}
.phase-head{display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap}
.phase-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.phase-name{font-family:'Geist Mono',monospace;font-size:15px;font-weight:600;flex:1;min-width:0}
.phase-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:.5px}
.p1 .phase-dot{background:var(--emerald)}.p1 .phase-badge{background:var(--emerald-g);color:var(--emerald)}
.p2 .phase-dot{background:var(--sky)}.p2 .phase-badge{background:var(--sky-g);color:var(--sky)}
.p3 .phase-dot{background:var(--violet)}.p3 .phase-badge{background:var(--violet-g);color:var(--violet)}
.p4 .phase-dot{background:var(--amber)}.p4 .phase-badge{background:var(--amber-g);color:var(--amber)}
.phase-desc{font-size:13px;color:var(--dim);margin:0 0 14px 22px;line-height:1.5}

.week-group{margin-bottom:16px}
.week-lbl{font-size:11px;font-weight:700;color:var(--dim2);text-transform:uppercase;letter-spacing:1.2px;margin:0 0 6px 34px}

.lesson{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:10px;transition:background .15s}
.lesson:hover{background:var(--s1)}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s;background:none;margin-top:1px;font-size:0}
.chk.done{border-color:var(--emerald);background:var(--emerald)}
.chk.done::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.lesson-body{flex:1;min-width:0}
.lesson-t{font-size:14px;font-weight:500;line-height:1.35}
.lesson-t.struck{text-decoration:line-through;opacity:.45}
.lesson-d{font-size:12px;color:var(--dim);margin-top:2px;line-height:1.45}
.lesson-scenario{font-size:12px;color:var(--sky);margin-top:3px;font-style:italic}
.lesson-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
.t{font-size:10px;padding:2px 7px;border-radius:12px;font-weight:700;letter-spacing:.3px}
.t-wknd{background:var(--orange-g);color:var(--orange)}
.t-wkdy{background:var(--emerald-g);color:var(--emerald)}
.t-work{background:var(--sky-g);color:var(--sky)}
.t-mac{background:var(--violet-g);color:var(--violet)}
.t-proj{background:var(--amber-g);color:var(--amber)}
.t-amz{background:var(--rose-g);color:var(--rose)}
.time-est{font-size:11px;color:var(--dim2);font-family:'Geist Mono',monospace;margin-left:auto;white-space:nowrap;padding-top:2px;flex-shrink:0}

/* Resource links inline */
.lesson-links{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.res-link{font-size:11px;color:var(--orange);background:var(--orange-g);padding:3px 9px;border-radius:8px;text-decoration:none;cursor:pointer;transition:.2s;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:3px}
.res-link:hover{background:rgba(249,115,22,.3);color:#fff}
.res-link::before{content:'🔗';font-size:9px}

/* Progress tab */
.ring-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-bottom:24px}
.ring-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:14px}
.ring-card svg{width:56px;height:56px;flex-shrink:0}
.r-title{font-size:13px;font-weight:600}
.r-sub{font-size:12px;color:var(--dim)}

.heat-section{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.heat-title{font-size:14px;font-weight:600;margin-bottom:2px}
.heat-sub{font-size:12px;color:var(--dim);margin-bottom:12px}
.heat-grid{display:flex;flex-wrap:wrap;gap:3px}
.hc{width:16px;height:16px;border-radius:3px;background:var(--s2)}
.hc.l1{background:rgba(249,115,22,.2)}.hc.l2{background:rgba(249,115,22,.4)}.hc.l3{background:rgba(249,115,22,.65)}.hc.l4{background:var(--orange)}

.log-section{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.log-title{font-size:14px;font-weight:600;margin-bottom:12px}
.log-entry{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;display:flex;gap:10px}
.log-entry:last-child{border:none}
.log-date{color:var(--dim);font-family:'Geist Mono',monospace;font-size:12px;flex-shrink:0}

/* Practice */
.drill{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
.drill h3{font-size:15px;font-weight:600;margin-bottom:1px}
.drill-cn{font-size:12px;color:var(--dim);margin-bottom:6px}
.drill-diff{font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block;font-weight:700;margin-bottom:8px}
.drill-diff.easy{background:var(--emerald-g);color:var(--emerald)}
.drill-diff.med{background:var(--amber-g);color:var(--amber)}
.drill-diff.hard{background:var(--violet-g);color:var(--violet)}
.drill p{font-size:13px;color:var(--dim);margin-bottom:10px;line-height:1.5}
.drill ol{font-size:13px;padding-left:20px;line-height:1.7}
.drill .tused{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.drill .tt{font-size:10px;background:var(--s3);padding:2px 8px;border-radius:6px;color:var(--dim)}

/* Resources */
.res-group{margin-bottom:22px}
.res-group h3{font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);margin-bottom:10px;font-weight:700}
.res-item{padding:12px 14px;background:var(--s1);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.res-item-head{display:flex;align-items:center;gap:10px}
.res-icon{font-size:18px;flex-shrink:0}
.res-name{font-size:14px;font-weight:500}
.res-desc{font-size:12px;color:var(--dim);margin-top:2px;margin-left:28px}
.res-why{font-size:11px;color:var(--orange);margin-top:3px;margin-left:28px}

/* Tooltip style for links */
.link-url{font-size:11px;color:var(--sky);word-break:break-all;margin-left:28px;margin-top:2px;text-decoration:none;transition:.2s}
.link-url:hover{color:var(--text);text-decoration:underline}

@media(max-width:600px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .time-est{display:none}
  .lesson{padding:8px 4px}
}

.sync-bar{display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.sync-btn{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--s1);color:var(--dim);cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;gap:5px}
.sync-btn:hover{border-color:var(--orange);color:var(--text)}
.reset-btn{border-color:var(--rose) !important;color:var(--rose) !important}
.reset-btn:hover{background:var(--rose-g) !important}
.sync-badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;letter-spacing:.3px}
.sync-badge.synced{background:var(--emerald-g);color:var(--emerald)}
.sync-badge.syncing{background:var(--amber-g);color:var(--amber)}
.sync-badge.offline{background:var(--rose-g);color:var(--rose)}
.sync-badge.idle{background:var(--s2);color:var(--dim)}
.theme-toggle{font-size:20px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--s1);cursor:pointer;font-family:inherit;transition:.2s}
.theme-toggle:hover{border-color:var(--orange)}
.lesson-notes{margin-top:8px;width:100%;min-height:60px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:inherit;font-size:12px;resize:vertical;transition:.2s}
.lesson-notes:focus{outline:none;border-color:var(--orange);background:var(--s1)}
.lesson-notes::placeholder{color:var(--dim2)}
</style>
</head>

// ============================================================
// STATE — localStorage only (no cloud sync)
// ============================================================
const LOCAL_KEY = 'aaron-ai-learning-progress';

let STATE = {completed:{}, log:[], weeklyMinutes:{}, notes:{}};
let darkMode = true; // default dark mode

function loadState(){
  // Load from localStorage
  try {
    const local = localStorage.getItem(LOCAL_KEY);
    if(local) STATE = JSON.parse(local);
  } catch(e){
    console.log('Failed to load state', e);
  }
}

function saveState(){
  // Save to localStorage only
  try { 
    localStorage.setItem(LOCAL_KEY, JSON.stringify(STATE)); 
  } catch(e){
    console.log('Failed to save state', e);
  }
}

// Export/Import still available as backup
function exportProgress(){
  const data = JSON.stringify(STATE, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ai-forge-progress.json';
  a.click(); URL.revokeObjectURL(url);
}

function importProgress(){
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async(e) => {
    const file = e.target.files[0]; if(!file) return;
    const text = await file.text();
    try {
      STATE = JSON.parse(text);
      saveState(); render();
      alert('Progress imported successfully! ✅ 进度已导入！');
    } catch(err){ alert('Invalid file format 文件格式错误'); }
  };
  input.click();
}

function toggleLesson(id){
  if(STATE.completed[id]){delete STATE.completed[id];STATE.log=STATE.log.filter(l=>l.id!==id)}
  else{STATE.completed[id]=Date.now();STATE.log.unshift({id,date:new Date().toISOString().slice(0,10),t:getLessonTitle(id)});if(STATE.log.length>50)STATE.log.pop()}
  saveState();render();
}
function getLessonTitle(id){for(const p of PHASES)for(const w of p.weeks)for(const l of w.lessons)if(l.id===id)return l.t;return id}
function getTotalLessons(){let c=0;PHASES.forEach(p=>p.weeks.forEach(w=>c+=w.lessons.length));return c}
function getCompletedCount(){return Object.keys(STATE.completed).length}
function getPhaseProgress(pid){const p=PHASES.find(x=>x.id===pid);if(!p)return 0;let t=0,d=0;p.weeks.forEach(w=>w.lessons.forEach(l=>{t++;if(STATE.completed[l.id])d++}));return t?Math.round(d/t*100):0}
function getPhaseNums(pid){let t=0,d=0;PHASES.find(x=>x.id===pid)?.weeks.forEach(w=>w.lessons.forEach(l=>{t++;if(STATE.completed[l.id])d++}));return{t,d}}
function getStreak(){if(!STATE.log.length)return 0;const dates=[...new Set(STATE.log.map(l=>l.date))].sort().reverse();let s=0;const d=new Date();for(let i=0;i<60;i++){const ds=d.toISOString().slice(0,10);if(dates.includes(ds)){s++;d.setDate(d.getDate()-1)}else if(i===0){d.setDate(d.getDate()-1)}else break}return s}
function getCurrentWeek(){const done=getCompletedCount();if(!done)return 1;for(const p of PHASES)for(const w of p.weeks){const wd=w.lessons.filter(l=>STATE.completed[l.id]).length;if(wd<w.lessons.length)return PHASES.indexOf(p)*4+p.weeks.indexOf(w)+1}return 16}

function renderProgress(){
  const colors=[
    {name:'Phase 1 读懂AI输出',id:'p1',color:'var(--emerald)'},
    {name:'Phase 2 业务智能',id:'p2',color:'var(--sky)'},
    {name:'Phase 3 构建者模式',id:'p3',color:'var(--violet)'},
    {name:'Phase 4 规模化引领',id:'p4',color:'var(--amber)'},
  ];
  const rings=colors.map(c=>{
    const pct=getPhaseProgress(c.id),{t,d}=getPhaseNums(c.id);
    const r=22,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
    return `<div class="ring-card">
      <svg viewBox="0 0 56 56"><circle cx="28" cy="28" r="${r}" fill="none" stroke="var(--s3)" stroke-width="5"/>
      <circle cx="28" cy="28" r="${r}" fill="none" stroke="${c.color}" stroke-width="5" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 28 28)" style="transition:.6s"/>
      <text x="28" y="32" text-anchor="middle" fill="${c.color}" font-size="13" font-family="Geist Mono,monospace" font-weight="600">${pct}%</text></svg>
      <div><div class="r-title">${c.name}</div><div class="r-sub">${d}/${t} lessons</div></div></div>`}).join('');

  const dateCounts={};STATE.log.forEach(l=>{dateCounts[l.date]=(dateCounts[l.date]||0)+1});
  const heatCells=[];const d=new Date();d.setDate(d.getDate()-119);
  for(let i=0;i<120;i++){const ds=d.toISOString().slice(0,10);const cnt=dateCounts[ds]||0;heatCells.push(`<div class="hc ${cnt===0?'':cnt===1?'l1':cnt===2?'l2':cnt<=3?'l3':'l4'}" title="${ds}: ${cnt}"></div>`);d.setDate(d.getDate()+1)}

  const logHtml=STATE.log.slice(0,12).map(l=>`<div class="log-entry"><span class="log-date">${l.date}</span><span>✅ ${l.t}</span></div>`).join('')||'<div style="color:var(--dim);font-size:13px;padding:8px 0">No activity yet — check off your first lesson! 还没有记录，开始吧！</div>';

  return `<div class="ring-grid">${rings}</div>
    <div class="heat-section"><div class="heat-title">Activity Heatmap 学习热力图</div><div class="heat-sub">Last 120 days / 最近120天</div><div class="heat-grid">${heatCells.join('')}</div></div>
    <div class="log-section" style="margin-top:16px"><div class="log-title">Recent Activity 最近记录</div>${logHtml}</div>`;
}

function renderPractice(){
  return `<div style="font-size:13px;color:var(--dim);margin-bottom:16px;line-height:1.5">Standalone exercises you can do anytime, using your real Amazon work data. Start with ⚡Easy for quick wins. 随时可做的练习，用你真实的工作数据。</div>`+
  PRACTICES.map(p=>`<div class="drill">
    <h3>${p.title}</h3><div class="drill-cn">${p.cn}</div>
    <span class="drill-diff ${p.diff}">${{easy:'⚡ EASY',med:'🔶 MEDIUM',hard:'💎 HARD'}[p.diff]}</span>
    <p>${p.desc}</p>
    <ol>${p.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
    <div class="tused">${p.tools.map(t=>`<span class="tt">${t}</span>`).join('')}</div>
  </div>`).join('');
}

function renderResources(){
  return RESOURCES.map(g=>`<div class="res-group"><h3>${g.cat}</h3>
    ${g.items.map(r=>`<div class="res-item">
      <div class="res-item-head"><span class="res-icon">${r.icon}</span><span class="res-name">${r.name}</span></div>
      <div class="res-desc">${r.desc}</div>
      ${r.url?`<a class="link-url" href="${r.url.startsWith('http')?r.url:'https://'+r.url}" target="_blank" rel="noopener" style="display:block;color:var(--sky);text-decoration:none">${r.url}</a>`:''}
      <div class="res-why">💡 ${r.why}</div>
    </div>`).join('')}
  </div>`).join('');
}

function toggleTheme(){
  darkMode = !darkMode;
  document.documentElement.classList.toggle('light', !darkMode);
  localStorage.setItem('theme', darkMode ? 'dark' : 'light');
  render();
}

function saveNote(lessonId, note){
  if(!STATE.notes) STATE.notes = {};
  STATE.notes[lessonId] = note;
  saveState();
}

// INIT
(()=>{
  // Load theme preference
  const savedTheme = localStorage.getItem('theme');
  if(savedTheme === 'light'){
    darkMode = false;
    document.documentElement.classList.add('light');
  }
  loadState();
  render();
})();
</script>
</body>
</html>
